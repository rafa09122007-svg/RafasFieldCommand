<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8" />
  <title>Black Drop Field Command</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />


  <style>
    html,
    body,
    #root {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      background: #0a0a0a;
      overflow-x: hidden;
    }

    body {
      overscroll-behavior: none;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }
  </style>

</head>

<body>

  <div id="root"></div>

  <script type="module" src="/src/main.jsx"></script>

</body>

</html>
